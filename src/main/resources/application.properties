spring.application.name=RFID

# Timezone Configuration - Force IST to ensure correct timestamps across the app
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata

# Server Configuration
server.port=${PORT:8081}
# Database Configuration (File-based H2 persistence stored under ./data/rfiddb)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/rfiddb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# Hibernate DDL Auto
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (for debugging and local development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Token Configuration
jwt.secret=${JWT_SECRET:ZEN_CUBE_JWT_SUPER_SECRET_KEY_FOR_LOCAL_DEV_MUST_BE_LONG_AND_SECURE_KEYS}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Tap Simulating Device Authentication Key
device.key=${DEVICE_KEY:ZEN_DEVICE_SECRET_KEY}

# Email Configuration (Requires valid Gmail SMTP credentials via Env Variables)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:vishnuchityala.ai@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:cjte xytf kwrc liqx}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

